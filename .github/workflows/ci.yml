name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.100
      - uses: Swatinem/rust-cache@v2
      - name: Run tests
        run: cargo test --lib

  clippy:
    name: Clippy (correctness only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.100
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # v0.1: deny only correctness/suspicious. Pedantic warnings tracked in ROADMAP Sprint 15 polish.
      - name: Run Clippy
        run: cargo clippy --all-targets -- -D clippy::correctness -D clippy::suspicious -A clippy::pedantic

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.100
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  lockfile:
    name: Lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.100
      - name: Check lockfile
        run: cargo fetch --locked
